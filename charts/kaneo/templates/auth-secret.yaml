{{- if not .Values.kaneo.env.existingSecret.enabled }}
{{- $secretName := printf "%s-auth" (include "kaneo.fullname" .) }}
{{- $secretValue := .Values.kaneo.env.authSecret | toString }}
{{- if not $secretValue }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
  {{- if and $existing $existing.data (hasKey $existing.data "auth-secret") }}
    {{- $secretValue = (index $existing.data "auth-secret" | b64dec) }}
  {{- else }}
    {{- $secretValue = randAlphaNum 64 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "kaneo.labels" . | nindent 4 }}
type: Opaque
stringData:
  auth-secret: {{ $secretValue | quote }}
{{- end }}
