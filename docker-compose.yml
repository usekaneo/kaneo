services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${KANEO_DB}
      POSTGRES_USER: ${KANEO_DB_USER}
      POSTGRES_PASSWORD: ${KANEO_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: "postgresql://${KANEO_DB_USER}:${KANEO_DB_PASSWORD}@postgres:5432/${KANEO_DB}"
      JWT_ACCESS: ${KANEO_JWT_ACCESS}
      AUTH_SECRET: ${AUTH_SECRET}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      KANEO_CLIENT_URL: ${KANEO_CLIENT_URL}
      KANEO_API_URL: ${KANEO_API_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION}
      DISABLE_PASSWORD_REGISTRATION: ${DISABLE_PASSWORD_REGISTRATION}
      ALLOWED_SIGNUP_EMAIL_DOMAIN: ${ALLOWED_SIGNUP_EMAIL_DOMAIN}
      REGISTRATION_URL_UUID: ${REGISTRATION_URL_UUID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS}
      SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_MAX_IMAGE_UPLOAD_BYTES: ${S3_MAX_IMAGE_UPLOAD_BYTES}
      S3_PRESIGN_TTL_SECONDS: ${S3_PRESIGN_TTL_SECONDS}
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      KANEO_API_URL: ${KANEO_API_URL}
      VITE_API_URL: ${KANEO_API_URL}
      VITE_APP_URL: ${KANEO_CLIENT_URL}
      VITE_CLIENT_URL: ${KANEO_CLIENT_URL}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
