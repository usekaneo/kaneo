name: Publish MCP Package

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - packages/mcp/package.json

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-mcp
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'push' || startsWith(github.event.release.tag_name, 'mcp-v') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run MCP checks
        run: |
          pnpm --filter @kaneo/mcp test
          pnpm --filter @kaneo/mcp build

      - name: Validate MCP release tag
        if: ${{ github.event_name == 'release' }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/mcp/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#mcp-v}"

          if [ "${GITHUB_REF_NAME}" = "${TAG_VERSION}" ]; then
            echo "Release tag must start with mcp-v, got ${GITHUB_REF_NAME}"
            exit 1
          fi

          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Release tag version (${TAG_VERSION}) does not match packages/mcp version (${PACKAGE_VERSION})"
            exit 1
          fi

      - name: Check whether @kaneo/mcp version is already published
        id: version_check
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/mcp/package.json').version")

          if npm view "@kaneo/mcp@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "@kaneo/mcp@${PACKAGE_VERSION} is already published; skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @kaneo/mcp
        if: ${{ steps.version_check.outputs.already_published == 'false' }}
        run: |
          cd packages/mcp
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create MCP release
        if: ${{ github.event_name == 'push' }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/mcp/package.json').version")

          if gh release view "mcp-v${PACKAGE_VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release mcp-v${PACKAGE_VERSION} already exists; skipping."
            exit 0
          fi

          gh release create "mcp-v${PACKAGE_VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "@kaneo/mcp v${PACKAGE_VERSION}" \
            --notes "Published [@kaneo/mcp@${PACKAGE_VERSION}](https://www.npmjs.com/package/@kaneo/mcp/v/${PACKAGE_VERSION}) to npm." \
            --latest=false
        env:
          GH_TOKEN: ${{ github.token }}
